<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Textilera - Login</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <main class="login-container">

        <h1>Textilera</h1>

        <form id="loginForm">

            <label>Usuario</label>

            <input
                type="text"
                id="user_name"
                placeholder="Usuario"
                required
            >

            <label>Contraseña</label>

            <input
                type="password"
                id="user_password"
                placeholder="Contraseña"
                required
            >

            <button type="submit">

                Iniciar sesión

            </button>

        </form>

        <p>

            ¿No tienes cuenta?

            <a href="register.html">

                Crear usuario

            </a>

        </p>

    </main>

    <script src="js/login.js"></script>

</body>
</html>
