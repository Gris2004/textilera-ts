<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Crear usuario</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<main class="register-container">

    <h1>Crear usuario</h1>

    <form id="registerForm">

        <label>Usuario</label>

        <input
            type="text"
            id="user_name"
            required
        >

        <label>Contraseña</label>

        <input
            type="password"
            id="user_password"
            required
        >

        <button type="submit">

            Registrarse

        </button>

    </form>

    <a href="index.html">

        Regresar al login

    </a>

</main>

<script src="js/register.js"></script>

</body>
</html>
